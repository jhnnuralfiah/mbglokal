<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard MBG</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="sidebar">
        <img src="/img/logo.png" class="sidebar-logo">
        <h2>MBG</h2>
        <ul>
            <li onclick="window.location='/index.html'">Dashboard</li>
            <li onclick="window.location='/data.html'"> Data</li>
            <li onclick="window.location='/profile.html'"> Profile</li>
        </ul>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="content">
        <div class="topbar">
            <h1>Dashboard</h1>
        </div>

        <div class="card-container">

                <p>120</p>
            </div>
            <div class="card">
                <h3>Program</h3>
                <p>50</p>
            </div>
            <div class="card">
                <h3>Aktif</h3>
                <p>30</p>
            </div>
        </div>

    <script src="/js/script.js"></script>

</html>
